<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GC Squad Dashboard - Velha Rada</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chart.js">
<style>
:root {
  --bg: #0a0a0a;
  --bg-secondary: #111;
  --text: #f0f0f0;
  --text-secondary: #a0a0a0;
  --accent: #00ff88;
  --accent-secondary: #00cc6a;
  --border: #222;
  --space-1: 0.5rem;
  --space-2: 1rem;
  --space-3: 1.5rem;
  --space-4: 2rem;
  --radius: 0.75rem;
}
[data-theme="light"] {
  --bg: #f8f9fa;
  --bg-secondary: #e9ecef;
  --text: #212529;
  --text-secondary: #6c757d;
  --accent: #28a745;
  --accent-secondary: #20c997;
  --border: #dee2e6;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Satoshi', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
.container { max-width: 1400px; margin: 0 auto; padding: var(--space-3); }
.header { text-align: center; margin-bottom: var(--space-4); }
.header h1 { font-size: clamp(2rem, 5vw, 3.5rem); background: linear-gradient(135deg, var(--accent), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: var(--space-1); }
.theme-toggle { position: fixed; top: var(--space-2); right: var(--space-2); background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; z-index: 1000; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: var(--space-3); margin-bottom: var(--space-4); }
.card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-3); transition: all 0.3s ease; }
.card:hover { border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,255,136,0.1); transform: translateY(-2px); }
.card h3 { color: var(--accent); margin-bottom: var(--space-2); font-size: 1.25rem; }
.empty-state { text-align: center; padding: var(--space-4); color: var(--text-secondary); }
.empty-state svg { font-size: 4rem; margin-bottom: var(--space-2); opacity: 0.5; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: var(--space-1); margin-top: var(--space-2); }
.stat { text-align: center; }
.stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
.fifa-card { position: relative; background: linear-gradient(135deg, #1a1a2e, #16213e); border: 2px solid var(--accent); border-radius: var(--radius); overflow: hidden; height: 420px; animation: cardSlideIn 0.6s ease-out; }
@keyframes cardSlideIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
.fifa-avatar { width: 100%; height: 200px; object-fit: cover; object-position: center top; }
.fifa-info { padding: var(--space-3); text-align: center; }
.fifa-nick { font-size: 1.4rem; font-weight: 900; color: var(--accent); margin-bottom: var(--space-1); text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
.fifa-level { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: var(--space-2); }
.fifa-stats { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-1); font-size: 0.85rem; }
.fifa-stat { display: flex; justify-content: space-between; padding: var(--space-1) 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
.fifa-highlight { grid-column: 1 / -1; background: rgba(0,255,136,0.1); border-radius: var(--radius); padding: var(--space-2); margin-top: var(--space-1); border: 1px solid var(--accent); }
.history-list { max-height: 400px; overflow-y: auto; }
.history-item { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-2); margin-bottom: var(--space-1); display: flex; justify-content: space-between; align-items: center; }
.history-result { font-weight: 700; font-size: 1.1rem; }
.history-win { color: var(--accent); }
.history-loss { color: #ff4444; }
.comparator { display: grid; grid-template-columns: 1fr 60px 1fr; gap: var(--space-2); align-items: center; }
.comparator-player { text-align: center; }
.comparator-vs { font-size: 1.5rem; font-weight: 700; color: var(--accent); text-align: center; writing-mode: vertical-rl; }
.comparator-stat { display: flex; align-items: center; justify-content: space-between; padding: var(--space-1); background: rgba(255,255,255,0.05); border-radius: 0.5rem; margin-bottom: var(--space-1); }
.chart-container { height: 300px; }
.coach-analysis { white-space: pre-wrap; line-height: 1.6; background: rgba(0,255,136,0.1); border-left: 4px solid var(--accent); padding: var(--space-2); border-radius: 0 var(--radius); }
.last-update { text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-top: var(--space-3); }
@media (max-width: 768px) { .comparator { grid-template-columns: 1fr; } .comparator-vs { writing-mode: horizontal-tb; } .stats-grid { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">🌙</button>
<div class="container">
  <header class="header">
    <h1>🎮 GC Squad Dashboard</h1>
    <p>Velha Rada - Stats CS2 GamersClub</p>
  </header>
  
  <div id="ranking" class="card"></div>
  
  <div class="grid">
    <div id="fifa-cards" class="grid"></div>
  </div>
  
  <div class="grid">
    <div id="history" class="card"></div>
    <div id="evolution" class="card"></div>
    <div id="coach" class="card"></div>
  </div>
  
  <div class="grid">
    <div id="comparator" class="card"></div>
    <div id="maps" class="card"></div>
  </div>
  
  <div class="last-update" id="lastUpdate"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let playersData = [], historyData = [], charts = {};
const playerMap = {}; // Mapeia ID para nick

async function loadData() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error('Erro no data.json');
    const data = await res.json();
    playersData = data.players || [];
    historyData = data.history || [];
    
    // Constrói mapa de nicks por ID
    playersData.forEach(p => playerMap[p.playerId] = p.playerNick);
    
    document.getElementById('lastUpdate').textContent = `Atualizado: ${new Date(data.lastUpdate).toLocaleString('pt-BR')}`;
    
    renderRanking();
    renderFifaCards();
    renderHistory();
    renderEvolution();
    renderCoach();
    renderComparator();
    renderMaps();
  } catch(e) {
    console.error(e);
    document.getElementById('ranking').innerHTML = '<div class="empty-state"><div class="ei">⚠️</div><h3>Erro ao carregar dados</h3><p>Verifique o data.json.</p></div>';
  }
}

function calculateRating(kdr, adr, kast, hs) {
  return Math.round(((kdr * 0.35) + (adr/100 * 0.3) + (kast/100 * 0.2) + (hs/100 * 0.15)) * 100) / 100;
}

function getColor(rating) {
  if (rating >= 1.1) return '#00ff88';
  if (rating >= 0.95) return '#ffdd00';
  if (rating >= 0.8) return '#ff8800';
  return '#ff4444';
}

function renderRanking() {
  const container = document.getElementById('ranking');
  if (playersData.length === 0) {
    container.innerHTML = '<div class="empty-state"><div>🏆</div><h3>Aguardando dados</h3><p>Primeira partida registra os ratings.</p></div>';
    return;
  }
  
  const ranked = playersData
    .filter(p => p.stats.rating > 0)
    .sort((a,b) => b.stats.rating - a.stats.rating)
    .slice(0,3);
  
  if (ranked.length === 0) {
    container.innerHTML = '<div class="empty-state"><div>🏆</div><h3>Aguardando ratings</h3><p>Jogue uma partida!</p></div>';
    return;
  }
  
  container.innerHTML = `
    <h3>🏆 Top 3 Rating</h3>
    <div class="stats-grid">
      ${ranked.map((p,i) => `
        <div class="stat">
          <div class="stat-value" style="color:${getColor(p.stats.rating)}">${p.stats.rating}</div>
          <div class="stat-label">${playerMap[p.playerId] || p.playerNick}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderFifaCards() {
  const container = document.getElementById('fifa-cards');
  container.innerHTML = playersData.map(p => {
    const rating = p.stats.rating || 0;
    const stats = p.stats;
    return `
      <div class="fifa-card">
        <img class="fifa-avatar" src="https://api.gamersclub.com.br/v1/players/${p.playerId}/avatar?size=512" alt="${p.playerNick}" onerror="this.src='https://via.placeholder.com/300x200/333/aaa?text=GC'">
        <div class="fifa-info">
          <div class="fifa-nick">${playerMap[p.playerId] || p.playerNick}</div>
          <div class="fifa-level">LVL ${p.level} • ${p.matches || 0} partidas</div>
          <div class="fifa-stats">
            <div class="fifa-stat"><span>K/D</span><span>${stats.kdr || '-'}</span></div>
            <div class="fifa-stat"><span>ADR</span><span>${stats.adr || '-'}</span></div>
            <div class="fifa-stat"><span>KAST</span><span>${stats.kast || '-'}</span></div>
            <div class="fifa-stat"><span>HS%</span><span>${stats.hs || '-'}</span></div>
            ${rating > 0 ? `<div class="fifa-highlight">
              <div style="font-size:1.4rem;font-weight:900;color:${getColor(rating)}">${rating}</div>
              <div style="font-size:0.8rem;color:var(--text-secondary)">GC Rating</div>
            </div>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderHistory() {
  const container = document.getElementById('history');
  if (historyData.length === 0) {
    container.innerHTML = '<div class="empty-state"><div>📋</div><h3>Aguardando partidas</h3><p>Mande o print!</p></div>';
    return;
  }
  
  container.innerHTML = `
    <h3>📋 Histórico (${historyData.length} partidas)</h3>
    <div class="history-list">
      ${historyData.slice(-10).reverse().map(h => {
        const nick = playerMap[h.playerId] || 'Desconhecido';
        const win = h.result === 'win';
        const mvp = h.mvp;
        return `
          <div class="history-item">
            <div>
              <div class="history-result ${win ? 'history-win' : 'history-loss'}">${win ? '✅' : '❌'} ${h.score} ${h.map}</div>
              <div style="font-size:0.9rem;color:var(--text-secondary)">${nick} ${mvp ? '👑 MVP' : ''} • ${new Date(h.date).toLocaleString('pt-BR')}</div>
            </div>
            <div style="font-weight:700">${h.rating || '-'}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderEvolution() {
  const container = document.getElementById('evolution');
  if (historyData.length < 2) {
    container.innerHTML = '<div class="empty-state"><div>📈</div><h3>Aguardando evolução</h3><p>2+ partidas</p></div>';
    return;
  }
  
  // Gráfico simples de rating ao longo do tempo
  const ctx = container.querySelector('canvas') || document.createElement('canvas');
  ctx.className = 'chart-container';
  container.innerHTML = '<h3>📈 Evolução Rating</h3><canvas></canvas>';
  container.appendChild(ctx);
  
  new Chart(ctx.getContext('2d'), {
    type: 'line',
    data: {
      labels: historyData.slice(-10).map(h => new Date(h.date).toLocaleDateString()),
      datasets: [{
        label: 'GC Rating',
        data: historyData.slice(-10).map(h => h.rating || 0),
        borderColor: '#00ff88',
        backgroundColor: 'rgba(0,255,136,0.1)',
        tension: 0.4,
        fill: true
      }]
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
  });
}

function renderCoach() {
  const container = document.getElementById('coach');
  if (historyData.length === 0) {
    container.innerHTML = '<div class="empty-state"><div>🤖</div><h3>Coach IA</h3><p>Aguardando análise</p></div>';
    return;
  }
  
  const wins = historyData.filter(h => h.result === 'win').length;
  const wr = ((wins / historyData.length) * 100).toFixed(1);
  const avgRating = historyData.reduce((sum, h) => sum + (h.rating || 0), 0) / historyData.length;
  
  container.innerHTML = `
    <h3>🤖 Coach IA</h3>
    <div class="coach-analysis">
WinRate: ${wr}% (${wins}/${historyData.length})
Rating médio: ${avgRating.toFixed(2)}
${wr > 60 ? '✅ Squad forte! Foquem em clutches.' : '⚠️ Treinem aim e smokes.'}
    </div>
  `;
}

function renderComparator() {
  const container = document.getElementById('comparator');
  if (playersData.length < 2) {
    container.innerHTML = '<div class="empty-state"><div>⚖️</div><h3>Comparador</h3><p>2+ jogadores</p></div>';
    return;
  }
  
  const p1 = playersData[0], p2 = playersData[1];
  container.innerHTML = `
    <h3>⚖️ Comparador</h3>
    <div class="comparator">
      <div class="comparator-player">${playerMap[p1.playerId] || p1.playerNick}</div>
      <div class="comparator-vs">VS</div>
      <div class="comparator-player">${playerMap[p2.playerId] || p2.playerNick}</div>
      <div class="comparator-stat" style="grid-column:1/-1"><span>GC Rating</span><span>${p1.stats.rating || '-'} vs ${p2.stats.rating || '-'}</span></div>
      <div class="comparator-stat"><span>K/D</span><span>${p1.stats.kdr || '-'} vs ${p2.stats.kdr || '-'}</span></div>
      <div class="comparator-stat"><span>ADR</span><span>${p1.stats.adr || '-'} vs ${p2.stats.adr || '-'}</span></div>
    </div>
  `;
}

function renderMaps() {
  const container = document.getElementById('maps');
  if (historyData.length === 0) {
    container.innerHTML = '<div class="empty-state"><div>🗺️</div><h3>Mapas</h3><p>Aguardando dados</p></div>';
    return;
  }
  
  const mapCount = {};
  historyData.forEach(h => mapCount[h.map] = (mapCount[h.map] || 0) + 1);
  const topMap = Object.entries(mapCount).sort((a,b) => b[1] - a[1])[0];
  
  container.innerHTML = `
    <h3>🗺️ Mapa Favorito</h3>
    <div class="stats-grid">
      <div class="stat">
        <div class="stat-value">${topMap[0]}</div>
        <div class="stat-label">${topMap[1]} partidas</div>
      </div>
    </div>
  `;
}

function toggleTheme() {
  document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
